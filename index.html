<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Counter</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.topbar{
  text-align:center;
  padding:2vh 0;
}

select,input,button{
  background:#111;
  color:#fff;
  border:1px solid #333;
  font-size:4.5vw;
  padding:2vw;
  margin:1vw;
}

.section{
  text-align:center;
  padding-top:3vh;
}

h2{
  font-size:8vw;
  margin-bottom:3vh;
}

.row{
  display:flex;
  justify-content:center;
  gap:4vw;
}

.box{
  width:22vw;
  height:30vh;
  border:1px solid #333;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
}

.arrow{
  font-size:10vw;
  width:100%;
  background:none;
  border:none;
  color:#ff9aa2;
}

.digit{
  font-size:15vw;
}

.footer{
  position:fixed;
  bottom:1vh;
  width:100%;
  text-align:center;
  font-size:3vw;
  color:#555;
}
</style>
</head>
<body>

<div class="topbar">
  <select id="projectSelect"></select>
  <input id="newProject" placeholder="새 프로젝트">
  <button onclick="addProject()">추가</button>
  <button onclick="deleteProject()">삭제</button>
</div>

<div class="section">
  <h2>단수</h2>
  <div class="row" id="row"></div>
</div>

<div class="section">
  <h2>코수</h2>
  <div class="row" id="stitch"></div>
</div>

<div class="footer">
  © 2026 Studio Y.Green. All rights reserved.
</div>

<script>
const select=document.getElementById("projectSelect");
const input=document.getElementById("newProject");

function createBoxes(id){
  const row=document.getElementById(id);
  [100,10,1].forEach(val=>{
    const box=document.createElement("div");
    box.className="box";
    box.innerHTML=
      '<button class="arrow" onclick="change(this,'+val+')">▲</button>'+
      '<div class="digit">0</div>'+
      '<button class="arrow" onclick="change(this,-'+val+')">▼</button>';
    row.appendChild(box);
  });
}
createBoxes("row");
createBoxes("stitch");

function getProjects(){
  return JSON.parse(localStorage.getItem("projects")||"[]");
}
function saveProjects(list){
  localStorage.setItem("projects",JSON.stringify(list));
}
function renderProjects(){
  let projects=getProjects();
  if(projects.length===0){
    projects=["기본"];
    saveProjects(projects);
  }
  select.innerHTML="";
  projects.forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p;
    opt.textContent=p;
    select.appendChild(opt);
  });
  select.value=projects[0];
  loadProject(projects[0]);
}
function addProject(){
  const name=input.value.trim();
  if(!name)return;
  let projects=getProjects();
  if(!projects.includes(name)){
    projects.push(name);
    saveProjects(projects);
  }
  renderProjects();
  select.value=name;
  loadProject(name);
  input.value="";
}
function deleteProject(){
  const name=select.value;
  let projects=getProjects().filter(p=>p!==name);
  saveProjects(projects);
  localStorage.removeItem(name+"_row");
  localStorage.removeItem(name+"_stitch");
  renderProjects();
}
function loadProject(name){
  ["row","stitch"].forEach(id=>{
    const digits=document.querySelector("#"+id).querySelectorAll(".digit");
    const value=parseInt(localStorage.getItem(name+"_"+id)||0);
    const str=String(value).padStart(3,'0');
    digits[0].textContent=str[0];
    digits[1].textContent=str[1];
    digits[2].textContent=str[2];
  });
}
function change(btn,delta){
  const section=btn.closest(".row");
  const digits=section.querySelectorAll(".digit");
  let value=
    digits[0].textContent*100+
    digits[1].textContent*10+
    digits[2].textContent*1;
  value+=delta;
  if(value<0)value=0;
  if(value>999)value=999;
  const str=String(value).padStart(3,'0');
  digits[0].textContent=str[0];
  digits[1].textContent=str[1];
  digits[2].textContent=str[2];
  localStorage.setItem(select.value+"_"+section.id,value);
}
select.addEventListener("change",()=>loadProject(select.value));
renderProjects();
</script>

</body>
</html>
